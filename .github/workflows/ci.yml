name: CI

on:
  push:
  pull_request:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"
      timezone: "America/Los_Angeles"

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import subprocess
          import sys
          import tomllib
          from pathlib import Path

          configuration = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          dependencies = [
              *configuration["project"]["dependencies"],
              *configuration["project"]["optional-dependencies"]["dev"],
          ]
          subprocess.run(
              [sys.executable, "-m", "pip", "install", *dependencies],
              check=True,
          )
          PY

      - name: Run tests with branch coverage
        run: python -m pytest --cov --cov-report=term-missing

  quality:
    name: Ruff lint and formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import subprocess
          import sys
          import tomllib
          from pathlib import Path

          configuration = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          dependencies = [
              *configuration["project"]["dependencies"],
              *configuration["project"]["optional-dependencies"]["dev"],
          ]
          subprocess.run(
              [sys.executable, "-m", "pip", "install", *dependencies],
              check=True,
          )
          PY

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

  evaluation:
    name: Offline adversarial evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import subprocess
          import sys
          import tomllib
          from pathlib import Path

          configuration = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          dependencies = [
              *configuration["project"]["dependencies"],
              *configuration["project"]["optional-dependencies"]["dev"],
          ]
          subprocess.run(
              [sys.executable, "-m", "pip", "install", *dependencies],
              check=True,
          )
          PY

      - name: Run deterministic offline evaluation
        run: python evaluations/run_evaluations.py
